# GitHub Pages config for the Presidenter policies site.
# Cayman is a clean, professional Jekyll theme that ships with
# GitHub Pages — no extra setup, just works.

title: "Presidenter — Policies"
description: "Privacy policy and support information for Presidenter."
theme: jekyll-theme-cayman

# Disable Jekyll's default footer ("This site is hosted on GitHub
# Pages") since these are App-Store-visible policy pages and the
# extra footer copy distracts from the actual content.
show_downloads: false
